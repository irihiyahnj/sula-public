[[project]]
slug = "okoktoto-v5-example"
name = "OKOKTOTO v5 Example Canary"
profile = "react-frontend-erpnext"
repository = "in-repo example"
primary_branch = "main"
deployment_branch = "okoktoto-v5"
current_sula_version = "0.13.0"
sync_status = "canary"
canary = true
local_root = "examples/okoktoto"
owner = "Sula Core"
notes = "In-repo canary used to validate the single-project memory contract and strict doctor behavior."

