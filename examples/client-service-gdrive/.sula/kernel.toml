[kernel]
sula_version = "0.11.0"
profile = "generic-project"
content_locale = "en"
interaction_locale = "en"
adapters = ["generic-project", "docs", "memory", "repo", "google-drive"]
git_enabled = true
adapter_catalog = ".sula/adapters/catalog.json"
bundle_catalog = ".sula/adapters/bundles.json"
artifact_catalog = ".sula/artifacts/catalog.json"
object_catalog = ".sula/objects/catalog.json"
state_snapshot = ".sula/state/current.md"
source_registry = ".sula/sources/registry.json"
event_log = ".sula/events/log.jsonl"
index_catalog = ".sula/indexes/catalog.json"
relation_index = ".sula/indexes/relations.json"
sqlite_cache = ".sula/cache/kernel.db"
export_catalog = ".sula/exports/catalog.json"
removal_mode = "explicit-remove-command"
