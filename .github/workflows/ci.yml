name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run CLI tests
        run: python -m unittest discover -s tests -v
      - name: Verify self-managed root
        run: |
          python scripts/sula.py memory digest --project-root .
          python scripts/sula.py doctor --project-root . --strict
      - name: Verify in-repo canary
        run: |
          python scripts/sula.py memory digest --project-root examples/okoktoto
          python scripts/sula.py doctor --project-root examples/okoktoto --strict
