name: Bug report
description: Report a defect in Sula Core, templates, or adoption flow.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include exact commands, files, or repository shape needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Sync impact
      description: Does this affect only Sula Core, or could it affect adopted repositories?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What checks did you run, and what were the results?
