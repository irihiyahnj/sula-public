name: Feature request
description: Propose an improvement to Sula Core or an existing profile.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or friction are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: portability
    attributes:
      label: Portability
      description: Explain whether this belongs in Sula Core, an existing profile, or a project-owned layer.
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout impact
      description: Describe how adopted repositories would be affected.
